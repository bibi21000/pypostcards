[DEFAULT]
datadir = /data
importdir = /import
tmpdir = /tmp/pypostcards
file_format = tiff
collections =
collections_map =
max_workers = 5
lock_suffix = .lck
lock_poll_interval = 2.0
lock_timeout = 60.0

[flask]
host = 0.0.0.0
port = 8001
debug = True
secret_key = secret
osm_map=
icon=My PostCards
# Fenêtre (en jours) des "nouveautés" mises en avant sur la page d'accueil
recent_days=30
# Si aucune carte n'a été ajoutée dans cette fenêtre, nombre de derniers
# ajouts à proposer à la place (toujours triés par date d'ajout)
recent_fallback_count=20
